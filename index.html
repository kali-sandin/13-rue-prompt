<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>13 Rue del Prompt</title>
  <meta name="description" content="Libro interactivo de cómic con páginas borrables." />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="app" id="app" aria-label="13 Rue del Prompt">
    <section class="book-stage" id="bookStage">
      <img class="book-background" id="bookBackground" alt="Libro abierto" />

      <button class="nav-arrow nav-prev" id="prevPageButton" type="button" aria-label="Página anterior">&lt;</button>
      <button class="nav-arrow nav-next" id="nextPageButton" type="button" aria-label="Página siguiente">&gt;</button>

      <article class="page page-left" id="leftPage" aria-label="Página izquierda">
        <img class="page-image page-base" alt="Contenido oculto de la página izquierda" />
        <canvas class="scratch-layer" aria-label="Capa borrable izquierda"></canvas>
        <button class="info-button info-left" type="button" aria-label="Información de la página izquierda">i</button>
        <aside class="info-popover" role="tooltip"></aside>
      </article>

      <article class="page page-right" id="rightPage" aria-label="Página derecha">
        <img class="page-image page-base" alt="Contenido oculto de la página derecha" />
        <canvas class="scratch-layer" aria-label="Capa borrable derecha"></canvas>
        <button class="info-button info-right" type="button" aria-label="Información de la página derecha">i</button>
        <aside class="info-popover" role="tooltip"></aside>
      </article>

      <div class="cover-screen" id="coverScreen" aria-label="Cubierta del libro">
        <img id="coverImage" alt="Cubierta del libro" />
      </div>

      <div class="page-turn" id="pageTurn" aria-hidden="true">
        <img alt="" />
      </div>

      <div class="rubber-cursor" id="rubberCursor" aria-hidden="true"></div>
    </section>

    <nav class="controls" aria-label="Controles">
      <button type="button" id="fullscreenButton">Maximizar</button>
      <button type="button" id="resetButton">Reiniciar páginas</button>
      <button type="button" id="soundButton" aria-pressed="false">Sonido: off</button>
    </nav>
  </main>

  <audio id="eraseSound" data-audio-base="assets/audio/erase" preload="auto"></audio>
  <audio id="pageFlipSound" data-audio-base="assets/audio/page-flip" preload="auto"></audio>
  <audio id="music" data-audio-base="assets/audio/music" preload="auto" loop></audio>

  <script src="src/app.js" defer></script>
</body>
</html>
