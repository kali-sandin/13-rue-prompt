<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>13 Rue del Prompt</title>
  <meta name="description" content="Libro interactivo de cómic con páginas borrables." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body class="is-loading">
  <main class="app" id="app" aria-label="13 Rue del Prompt">
    <section class="book-stage" id="bookStage">
      <img class="book-background" id="bookBackground" alt="Libro abierto" />

      <button class="nav-arrow nav-prev" id="prevPageButton" type="button" aria-label="Página anterior">&lt;</button>
      <button class="nav-arrow nav-next" id="nextPageButton" type="button" aria-label="Página siguiente">&gt;</button>
      <nav class="page-index" id="pageIndex" aria-label="Índice de páginas"></nav>

      <article class="page page-left" id="leftPage" aria-label="Página izquierda">
        <img class="page-image page-base" alt="Contenido oculto de la página izquierda" />
        <canvas class="scratch-layer" aria-label="Capa borrable izquierda"></canvas>
        <button class="info-button info-left" type="button" aria-label="Información de la página izquierda">i</button>
        <aside class="info-popover" role="tooltip"></aside>
      </article>

      <article class="page page-right" id="rightPage" aria-label="Página derecha">
        <img class="page-image page-base" alt="Contenido oculto de la página derecha" />
        <div class="final-tribute" id="finalTribute" aria-label="Homenaje a Francisco Ibáñez">
          <div class="tribute-photo" aria-label="Francisco Ibáñez">
            <img class="tribute-ibanez" src="assets/pages/Ibañez.jpg" alt="Francisco Ibáñez" />
            <span class="tape tape-top-left" aria-hidden="true"></span>
            <span class="tape tape-top-right" aria-hidden="true"></span>
            <span class="tape tape-bottom-left" aria-hidden="true"></span>
            <span class="tape tape-bottom-right" aria-hidden="true"></span>
          </div>
          <p><span>Homenaje a Francisco Ibáñez (1936-2023)</span><span>Gracias por darnos esos momentos de nuestra infancia.</span></p>
          <img class="tribute-mortadelo" src="assets/pages/mortadelo.png" alt="Mortadelo" />
        </div>
        <canvas class="scratch-layer" aria-label="Capa borrable derecha"></canvas>
        <button class="info-button info-right" type="button" aria-label="Información de la página derecha">i</button>
        <aside class="info-popover" role="tooltip"></aside>
      </article>

      <div class="cover-screen" id="coverScreen" aria-label="Cubierta del libro">
        <img id="coverImage" alt="Cubierta del libro" />
      </div>

      <div class="page-turn" id="pageTurn" aria-hidden="true">
        <img alt="" />
      </div>

      <div class="tool-cursor" id="toolCursor" aria-hidden="true"></div>
      <div class="magnifier-lens" id="magnifierLens" aria-hidden="true"></div>
    </section>

    <nav class="controls" aria-label="Controles">
      <button type="button" id="fullscreenButton" class="control-icon" aria-label="Maximizar" title="Maximizar">⛶</button>
      <button type="button" id="resetButton" class="control-icon" aria-label="Reiniciar páginas" title="Reiniciar páginas">↺</button>
      <button type="button" id="soundButton" class="control-icon" aria-label="Sonido desactivado" title="Sonido" aria-pressed="false">🔇</button>
      <section class="toolbox" aria-label="Herramientas">
        <div class="toolbox-title">Herramientas</div>
        <div class="toolbox-buttons" role="group" aria-label="Herramientas de página">
          <button class="tool-button is-active" type="button" data-tool="eraser" aria-pressed="true" title="Goma de borrar">
            <img src="assets/ui/eraser.png" alt="" />
            <span>Goma</span>
          </button>
          <button class="tool-button" type="button" data-tool="coin" aria-pressed="false" title="Moneda">
            <img src="assets/ui/moneda.png" alt="" />
            <span>Moneda</span>
          </button>
          <button class="tool-button" type="button" data-tool="pencil" aria-pressed="false" title="Lápiz">
            <img src="assets/ui/lapiz.png" alt="" />
            <span>Lápiz</span>
          </button>
          <button class="tool-button" type="button" data-tool="monocle" aria-pressed="false" title="Monóculo">
            <span class="tool-emoji" aria-hidden="true">🧐</span>
            <span>Monóculo</span>
          </button>
        </div>
      </section>
    </nav>
  </main>

  <audio id="eraseSound" data-audio-base="assets/audio/erase" preload="auto"></audio>
  <audio id="pencilSound" data-audio-base="assets/audio/lapiz" preload="auto"></audio>
  <audio id="pageFlipSound" data-audio-base="assets/audio/page-flip" preload="auto"></audio>
  <audio id="music" data-audio-base="assets/audio/music" preload="auto" loop></audio>

  <script src="src/app.js" defer></script>
</body>
</html>
